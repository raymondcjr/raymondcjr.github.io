<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raymond | Volkswagen Specialist</title>

  <style>
    :root {
      --bg-image: url("JettaGLIBG.jpg");
      --accent: #0D2C54; /* VW-inspired deep blue */
      --text: #ffffff;
      --card-bg: rgba(0, 0, 0, 0.55);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: var(--bg-image) center/cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 18px;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    p {
      margin: 8px 0 18px;
      opacity: 0.85;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      background: var(--accent);
      color: white;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .icon-row {
      display: flex;
      justify-content: space-around;
      margin-top: 16px;
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: white;
      font-size: 18px;
    }

    .footer {
      margin-top: 14px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <div class="card">

    <h1>Raymond</h1>
    <p>Vehicle Delivery & Product Specialist</p>

    <!-- Main CTA -->
    <a class="btn" href="tel:7276312950">Call Now</a>

    <!-- Add to Contacts (vCard download) -->
    <a class="btn secondary" href="contact.vcf" download>
      Add to Contacts
    </a>

    <!-- Optional icons -->
    <div class="icon-row">
      <a class="icon" href="tel:7276312950">📞</a>
      <a class="icon" href="sms:7276312950">💬</a>
      <a class="icon" href="mailto:raymondcjr.vw@gmail.com">✉️</a>
    </div>

    <div class="footer">
      Killeen Volkswagen
    </div>

  </div>
</div>

</body>
</html>
