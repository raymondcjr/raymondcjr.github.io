<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raymond | Volkswagen Specialist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alex Brush&display=swap" rel="stylesheet">

  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  
  <style>
    :root {
      --bg-image: url("JettaGLIBG.jpg");
      --accent: #1F2F57; /* VW deep blue */
      --gold: #D5A74D;
      --gray: #999999;
      --white: #F5F5F5;
      --vw-blue: #1F2F57;
      --vw-light-blue: #6091C3;
      --vw-white: #FDFAF9;
      --vw-gray: #A8A8A8;
      --card-bg: rgba(51, 51, 51, 0.20);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg-image) center/cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 18px;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 44px;
      font-family: "Alex Brush", cursive;
      color: var(--gold);
    }

    p {
      margin: 8px 0 18px;
      opacity: 1;
      color: var(--vw-gray);
    }

    .btn {
      display: inline-block;
      width: auto;
      min-width: 220px;
      max-width: 90%;
      padding: 12px 22px;
      margin: 14px auto;
      text-align: center;
      text-decoration: none;
      font-weight: 500;
      background-color: var(--accent);
      color: var(--gold);
      background-image: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.12),
        rgba(0, 0, 0, 0.18)
      );

      border: 0;
      border-radius: 30px;
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.3);
    }

   
    .icon-row {
      display: flex;
      justify-content: space-around;
      margin-top: 16px;
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: white;
      font-size: 18px;
    }

    .phone {
      color: #25D366;
    }

    .message {
      color: var(--vw-light-blue);
    }

    .email {
      color: var(--vw-gray);
    }
    
     .footer {
    margin-top: 14px;
    font-size: 13px;
    color: var(--gold);

    }
    
  </style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <div class="card">

    <h1>Raymond</h1>
    <p>Vehicle Delivery & Product Specialist</p>


    <!-- Add to Contacts (vCard download) -->
    <a class="btn" href="contact.vcf" download>
      Add to Contacts
    </a>

    <!-- Optional icons -->
    <div class="icon-row">
    <a class="icon phone" href="tel:7276312950">
    <i class="fa-solid fa-phone"></i>
    </a>

    <a class="icon message" href="sms:7276312950">
    <i class="fa-solid fa-message"></i>
    </a>

    <a class="icon email" href="mailto:raymondcjr.vw@gmail.com">
    <i class="fa-solid fa-envelope"></i>
    </a>
</div>
    
    <div class="footer">
      Volkswagen
    </div>

  </div>
</div>

</body>
</html>
